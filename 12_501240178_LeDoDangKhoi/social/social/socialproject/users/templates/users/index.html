{% extends 'users/base.html' %}

{% block body %}
<h1>Home page for users app</h1>

<a href="{% url 'posts:create' %}" class="btn btn-primary mb-3">
  <i class="bi bi-plus-lg me-2"></i> Create a post
</a>

<div class="row">
  {% for post in posts %}
    <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
      <div class="card h-100">
        <img src="{{ post.image.url }}" class="card-img-top" alt="...">

        <div class="card-body d-flex flex-column">
          <h5 class="card-title">{{ post.title }}</h5>
          <p class="card-text">{{ post.caption|truncatechars:80 }}</p>

          <div class="mt-auto">
            <a href="{% url 'posts:detail' post.id %}" class="btn btn-primary btn-sm">
              <i class="bi bi-eye me-1"></i> Read
            </a>
            <a href="{% url 'posts:edit' post.id %}" class="btn btn-secondary btn-sm">
              <i class="bi bi-pencil me-1"></i>
            </a>
            <a href="{% url 'posts:delete' post.id %}" class="btn btn-danger btn-sm">
              <i class="bi bi-trash me-1"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  {% endfor %}
</div>
{% endblock %}
