{% extends 'users/base.html' %}
{% block body %}
{% if validlink %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <input type="submit" value="">
    </form>
{% else %}
    <h2>The password reset link was invalid, possibly because it has already been used. Please request a new password reset.</h2>
{% endif %}
{% endblock %}
